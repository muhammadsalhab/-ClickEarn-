<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ClickEarn Academy</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

header{
  text-align:center;
  padding:80px 20px;
  background:linear-gradient(135deg,#2563eb,#06b6d4);
}

header h1{
  font-size:3em;
  margin:0;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-8px);
}

a{
  color:#38bdf8;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<header>
<h1>📚 ClickEarn Academy</h1>
<p>تعلم الأمن السيبراني والربح من الإنترنت بطريقة سهلة وواضحة</p>
</header>

<div class="container">

<h2>🔥 الدروس التعليمية</h2>

<div class="grid">

<div class="card">
<h3>🔐 كيف تحمي حسابك من الاختراق</h3>
<p>تعلم أهم طرق الحماية من الاختراق خطوة بخطوة.</p>
<a href="security.html">ابدأ الدرس</a>
</div>

<div class="card">
<h3>💰 كيف تبدأ الربح من الإنترنت</h3>
<p>تعلم طرق حقيقية للربح بدون خداع.</p>
<a href="money.html">ابدأ الدرس</a>
</div>

</div>

</div>

</body>
</html>
